name: Appcast integrity

# Guards the Sparkle feed users actually poll: every enclosure must point at
# THIS repo (no stale pre-rename hosts), be downloadable, and advertise the
# same byte length the feed promises. Read-only — never writes to the repo.

on:
  push:
    branches: [main]
    paths: ['appcast.xml']
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC — catches deleted releases/assets
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Validate appcast.xml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Parse feed (well-formed XML, unique versions, correct URL host)
        run: |
          python3 - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          SPARKLE = "http://www.andymatuschak.org/xml-namespaces/sparkle"
          PREFIX = "https://github.com/80x-org/product-releases/releases/download/"

          try:
              tree = ET.parse("appcast.xml")
          except ET.ParseError as e:
              print(f"::error file=appcast.xml::appcast.xml is not well-formed XML: {e}")
              sys.exit(1)

          items = tree.getroot().findall("channel/item")
          if not items:
              print("::error file=appcast.xml::appcast.xml has no <item> entries")
              sys.exit(1)

          errors = []
          seen = {}
          rows = []
          for item in items:
              title = (item.findtext("title") or "<untitled>").strip()
              enclosure = item.find("enclosure")
              if enclosure is None:
                  errors.append(f"{title}: missing <enclosure>")
                  continue
              version = enclosure.get(f"{{{SPARKLE}}}version") or ""
              url = enclosure.get("url") or ""
              length = enclosure.get("length") or ""
              signature = enclosure.get(f"{{{SPARKLE}}}edSignature") or ""
              if not version:
                  errors.append(f"{title}: enclosure has no sparkle:version")
              elif version in seen:
                  errors.append(f"{title}: duplicate sparkle:version {version} (also on {seen[version]})")
              else:
                  seen[version] = title
              if not url.startswith(PREFIX):
                  errors.append(f"{title}: enclosure URL does not start with {PREFIX} — got {url or '<empty>'}")
              if not length.isdigit():
                  errors.append(f"{title}: enclosure length {length!r} is not a number")
              if not signature:
                  errors.append(f"{title}: enclosure has no sparkle:edSignature; Sparkle would reject it")
              rows.append(f"{title}\t{url}\t{length}\t{signature}")

          for e in errors:
              print(f"::error file=appcast.xml::{e}")
          if errors:
              sys.exit(1)

          with open("items.tsv", "w") as fh:
              fh.write("\n".join(rows) + "\n")
          print(f"parsed {len(rows)} item(s); versions: {', '.join(seen)}")
          PY

      - name: Check every enclosure is reachable with the promised length
        run: |
          fail=0
          while IFS=$'\t' read -r title url length signature; do
            echo "==> $title"
            echo "    $url (expect $length bytes)"
            if ! curl -sfIL --max-time 60 "$url" -o /dev/null; then
              echo "::error::$title: enclosure URL is not reachable: $url"
              fail=1
              continue
            fi
            # Follow redirects and take the FINAL response's Content-Length
            # (github.com 302s to the asset host; earlier hops report their own).
            got="$(curl -sIL --max-time 60 "$url" | tr -d '\r' \
              | awk 'tolower($1) == "content-length:" { v = $2 } END { print v }')"
            if [ "$got" != "$length" ]; then
              echo "::error::$title: Content-Length $got != enclosure length $length ($url)"
              fail=1
            else
              echo "    OK ($got bytes)"
            fi
          done < items.tsv
          exit "$fail"

      # The feed's whole security model is the EdDSA signature: shape/host/
      # length checks pass even if an enclosure was tampered with or signed by
      # the wrong key, and installed apps would then refuse the update (or
      # worse, a compromised feed could try to push one). Verify every item's
      # sparkle:edSignature (Ed25519 over the raw DMG bytes) against the app's
      # embedded PUBLIC key. CI holds no private key: this is verify-only.
      - name: Verify every enclosure's EdDSA signature
        env:
          # Must equal SUPublicEDKey in product-mac-app/project.yml, the key
          # baked into every shipped app. If the Sparkle key is ever rotated,
          # update both places together.
          SU_PUBLIC_ED_KEY: "Skka3OwBLx13WqKQtuNOVzJSZaFga+2j6USQL9i7y1w="
        run: |
          python3 -m pip install --quiet cryptography
          python3 - <<'PY'
          import base64
          import os
          import sys
          import urllib.request

          from cryptography.exceptions import InvalidSignature
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PublicKey

          pub = Ed25519PublicKey.from_public_bytes(
              base64.b64decode(os.environ["SU_PUBLIC_ED_KEY"]))

          fail = False
          for line in open("items.tsv"):
              title, url, length, signature = line.rstrip("\n").split("\t")
              print(f"==> {title}")
              try:
                  sig = base64.b64decode(signature, validate=True)
              except Exception:
                  print(f"::error::{title}: sparkle:edSignature is not valid base64")
                  fail = True
                  continue
              try:
                  with urllib.request.urlopen(url, timeout=300) as resp:
                      data = resp.read()
              except Exception as e:
                  print(f"::error::{title}: could not download {url} for signature verification: {e}")
                  fail = True
                  continue
              try:
                  pub.verify(sig, data)
                  print(f"    signature OK ({len(data)} bytes)")
              except InvalidSignature:
                  print(f"::error::{title}: sparkle:edSignature does NOT verify against the app's public key ({url})")
                  fail = True
          sys.exit(1 if fail else 0)
          PY
